# ============================================
# CONFIGMAP - Configuración NO sensible
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-service-config
  namespace: catalog-service
  labels:
    app: catalog-service

# Pares clave-valor
data:

  # ⭐ CLAVE: Usa el nombre del Service de user-service
  ##USER_SERVICE_URL: "http://user-service"
  USER_SERVICE_URL: "http://user-service.user-service.svc.cluster.local"

  # URL de la base de datos
  # host.docker.internal apunta a localhost de tu PC
  DB_URL: "jdbc:postgresql://host.docker.internal:5435/catalogdb"


  # Configuración de JPA
  DDL_AUTO: "validate"
  SHOW_SQL: "false"

  # Pool de conexiones
  POOL_SIZE: "10"

  # Logging
  LOG_LEVEL: "INFO"
  SQL_LOG_LEVEL: "WARN"

  # JVM
  JAVA_OPTS: "-Xmx512m -Xms256m"