# ============================================
# CONFIGMAP - Configuración NO sensible
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-service-config
  namespace: delivery-service
  labels:
    app: delivery-service

# Pares clave-valor
data:
  USER_SERVICE_URL: "http://user-service.user-service.svc.cluster.local"
  ORDER_SERVICE_URL: "http://order-service.order-service.svc.cluster.local"
  KAFKA_SERVERS: "host.docker.internal:9093"
  # URL de la base de datos
  # host.docker.internal apunta a localhost de tu máquina
  DB_URL: "jdbc:postgresql://host.docker.internal:5438/deliverydb"

  # Configuración de JPA
  DDL_AUTO: "validate"
  SHOW_SQL: "false"

  # Pool de conexiones
  POOL_SIZE: "10"

  # Logging
  LOG_LEVEL: "INFO"
  SQL_LOG_LEVEL: "WARN"

  # JVM
  JAVA_OPTS: "-Xmx512m -Xms256m"