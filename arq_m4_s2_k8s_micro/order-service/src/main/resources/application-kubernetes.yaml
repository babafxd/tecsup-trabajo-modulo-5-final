# ============================================
# APPLICATION CONFIGURATION FOR KUBERNETES
# ============================================
# Este archivo se activa con: -Dspring.profiles.active=kubernetes
# Las variables ${} se reemplazan con variables de entorno

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: 8085

spring:
  application:
    name: order-service

  # ============================================
  # DATASOURCE CONFIGURATION
  # ============================================
  # Estas variables vienen de ConfigMap y Secrets de Kubernetes
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/orderdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    # ============================================
    # CONNECTION POOL
    # ============================================
    hikari:
      maximum-pool-size: ${POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 20000

  # ============================================
  # JPA CONFIGURATION
  # ============================================
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}

  # ============================================
  # KAFKA CONFIGURATION
  # ============================================
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_GROUP_ID:order-group}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Uso de ErrorHandlingDeserializer para evitar bucles infinitos si llega un mensaje mal formado
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"
            # 1. Usar headers para identificar el tipo de clase enviado
            use:
              type:
                headers: true
            # 2. Mapeo de tipos: Traduce la clase del emisor (payment) a la clase del receptor (order)
            type:
              mapping: >
                com.tecsup.app.micro.payment.domain.event.PaymentApprovedEvent:com.tecsup.app.micro.order.domain.event.PaymentApprovedEvent,
                com.tecsup.app.micro.payment.domain.event.PaymentRejectedEvent:com.tecsup.app.micro.order.domain.event.PaymentRejectedEvent
          # Delegado del ErrorHandlingDeserializer
          deserializer:
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JsonDeserializer

# ============================================
# ACTUATOR (Para health checks de Kubernetes)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ============================================
# LOGGING
# ============================================
logging:
  level:
    com.tecsup.app.micro.user: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://catalog-service.catalog-service.svc.cluster.local}
user:
  service:
    url: ${USER_SERVICE_URL:http://user-service.user-service.svc.cluster.local}

# ============================================
# JWT CONFIGURATION (Sesión 2)
# ============================================
