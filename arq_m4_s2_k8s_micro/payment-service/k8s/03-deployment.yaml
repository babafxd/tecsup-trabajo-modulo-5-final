# ============================================
# DEPLOYMENT - Gestión de Pods
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-service
  labels:
    app: payment-service

spec:
  # ========================================
  # Número de réplicas (copias)
  # ========================================
  replicas: 1  # Empezamos con 1 pod

  # ========================================
  # Selector: ¿Qué pods gestionar?
  # ========================================
  selector:
    matchLabels:
      app: payment-service

  # ========================================
  # Template: Cómo crear cada pod
  # ========================================
  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
        - name: payment-service

          # Imagen Docker
          image: payment-service:1.0

          # imagePullPolicy:
          # - Never: Solo usar imagen local (desarrollo)
          # - Always: Siempre descargar (producción)
          imagePullPolicy: Never

          # Puerto del contenedor
          ports:
            - containerPort: 8086
              name: http

          # ====================================
          # VARIABLES DE ENTORNO
          # ====================================
          env:
            # Forzamos el perfil para que busque las variables ${}
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"

          envFrom:
            # Esto inyecta KAFKA_SERVERS, DB_URL, LOG_LEVEL, etc.
            - configMapRef:
                name: payment-service-config
            # Esto inyecta DB_USERNAME, DB_PASSWORD, JWT_SECRET, etc.
            - secretRef:
                name: payment-service-secret